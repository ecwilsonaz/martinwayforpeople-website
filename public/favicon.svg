<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="#b91c1c">
  <!-- Head -->
  <circle cx="17" cy="4.5" r="3.2"/>
  <!-- Torso -->
  <rect x="15" y="8" width="4" height="8" rx="1.5"/>
  <!-- Front leg (stepping forward) -->
  <rect x="12" y="15" width="3.5" height="9" rx="1.5" transform="rotate(-20 13.75 19.5)"/>
  <!-- Back leg -->
  <rect x="17" y="15" width="3.5" height="9" rx="1.5" transform="rotate(15 18.75 19.5)"/>
  <!-- Front arm -->
  <rect x="10" y="9" width="3" height="7" rx="1.3" transform="rotate(30 11.5 12.5)"/>
  <!-- Back arm -->
  <rect x="19" y="9" width="3" height="7" rx="1.3" transform="rotate(-25 20.5 12.5)"/>
</svg>
